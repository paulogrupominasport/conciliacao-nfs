name: Atualizar dados do dashboard
# Roda a cada 30 min (minutos 7 e 37 para fugir do congestionamento de :00/:30),
# e tambem manualmente pelo botao "Run workflow".
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "build_data.py"
      - ".github/workflows/atualizar.yml"

permissions:
  contents: write

# Impede que duas execucoes (ex.: cron + push) colidam no git push.
concurrency:
  group: atualizar-dados
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Baixar planilha do Google Sheets (.xlsx)
        env:
          SHEET_ID: "1U5K5EWqIPMTs6_04NxIPS2DbVXxxkBIIW214aBxBdeI"
        run: |
          set -euo pipefail
          echo "Baixando planilha ${SHEET_ID} ..."
          # --fail: erra em HTTP >=400 | --retry: tenta de novo em falha transitoria
          curl --location --fail --silent --show-error \
               --retry 3 --retry-delay 5 \
               -o "BD_-_Conciliacao_Estoque.xlsx" \
               "https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=xlsx"
          # Valida que veio um XLSX de verdade (zip comeca com 'PK'), e nao uma
          # pagina de login/erro do Google (que viria como HTML).
          if [ "$(head -c 2 BD_-_Conciliacao_Estoque.xlsx)" != "PK" ]; then
            echo "ERRO: o download nao e um .xlsx valido."
            echo "Provavel causa: a planilha nao esta compartilhada como"
            echo "'Qualquer pessoa com o link' (modo leitor). Ajuste o"
            echo "compartilhamento no Google Sheets e rode de novo."
            head -c 400 BD_-_Conciliacao_Estoque.xlsx || true
            exit 1
          fi
          ls -la "BD_-_Conciliacao_Estoque.xlsx"

      - name: Gerar dados.json
        run: python build_data.py

      - name: Commitar dados.json se mudou
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json
          if git diff --staged --quiet; then
            echo "Sem mudancas nos dados."
          else
            git commit -m "Atualiza dados.json [automatico] $(date -u +'%Y-%m-%d %H:%M UTC')"
            # rebase defensivo caso o remoto tenha avancado entre runs
            git pull --rebase --autostash origin main || true
            git push
          fi
