name: Atualizar dados do dashboard
# Roda a cada 30 min (minutos 7 e 37 para fugir do congestionamento de :00/:30),
# e tambem manualmente pelo botao "Run workflow".
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "build_data.py"
      - "baixar_planilha.py"
      - ".github/workflows/atualizar.yml"

permissions:
  contents: write

# Impede que duas execucoes (ex.: cron + push) colidam no git push.
concurrency:
  group: atualizar-dados
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          # bibliotecas para baixar a planilha PRIVADA (conta de servico)
          pip install --quiet google-api-python-client google-auth

      - name: Baixar planilha do Google Sheets (.xlsx)
        env:
          SHEET_ID: "1U5K5EWqIPMTs6_04NxIPS2DbVXxxkBIIW214aBxBdeI"
          # Cole a chave JSON da conta de servico em Settings > Secrets and
          # variables > Actions, com o nome GOOGLE_SA_JSON. Se estiver vazio,
          # o download cai no modo publico automaticamente.
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python baixar_planilha.py

      - name: Gerar dados.json
        run: python build_data.py

      - name: Commitar dados.json se mudou
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json
          if git diff --staged --quiet; then
            echo "Sem mudancas nos dados."
          else
            git commit -m "Atualiza dados.json [automatico] $(date -u +'%Y-%m-%d %H:%M UTC')"
            # rebase defensivo caso o remoto tenha avancado entre runs
            git pull --rebase --autostash origin main || true
            git push
          fi
